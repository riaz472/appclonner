name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # NDK error ko khatam karne ke liye ye variable unset karenge
      ANDROID_NDK_HOME: ""
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x VirtualApp/gradlew

    - name: Build with Gradle
      # --no-daemon flag build ko stable banata hai
      run: cd VirtualApp && ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DevicePro-APK
        path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
