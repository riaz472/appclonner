name: Build & Sign Release APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r16b (required for armeabi-v7a + x86 prebuilts)
        run: echo "y" | sdkmanager "ndk;16.1.4479499" --sdk_root=$ANDROID_SDK_ROOT

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x VirtualApp/gradlew

      - name: Build Release APK
        run: cd VirtualApp && ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/16.1.4479499

      - name: Sign APK
        if: github.event_name != 'pull_request'
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: VirtualApp/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: VirtualApp-release-signed
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 30

      - name: Upload Unsigned APK (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: VirtualApp-release-unsigned
          path: VirtualApp/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          generate_release_notes: true
