name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      # Yahan path sahi kar diya hai
      run: chmod +x VirtualApp/gradlew

    - name: Build with Gradle
      # Yahan cd command se folder ke andar ja kar build hoga
      run: cd VirtualApp && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DevicePro-APK
        # APK ka path bhi update kar diya hai
        path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
