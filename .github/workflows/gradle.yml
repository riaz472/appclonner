name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # Gradle 4.1 ke liye Java 8 (1.8) zaroori hai
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x VirtualApp/gradlew

    - name: Build with Gradle
      run: cd VirtualApp && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: DevicePro-APK
        path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
