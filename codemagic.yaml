workflows:
  android-apk-build:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > ./VirtualApp/local.properties
      - name: Build Android APK
        script: |
          cd ./VirtualApp
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - ./VirtualApp/app/build/outputs/apk/debug/*.apk
